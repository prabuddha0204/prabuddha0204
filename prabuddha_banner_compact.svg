<svg width="1600" height="400" viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg">
  <title>GitHub Profile Banner — Prabuddha Saxena</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap');
    </style>
    <linearGradient id="left-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111113" stop-opacity="1"/>
      <stop offset="55%" stop-color="#111113" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#111113" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="right-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111113" stop-opacity="0"/>
      <stop offset="55%" stop-color="#111113" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#111113" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="banner-clip">
      <rect width="1600" height="400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1600" height="400" fill="#111113"/>

  <g clip-path="url(#banner-clip)">
    <!-- PCB traces: left zone -->
    <g opacity="0.30" stroke="#1C2D3E" stroke-width="1" fill="none">
      <line x1="0" y1="60" x2="600" y2="60"/>
      <line x1="0" y1="120" x2="400" y2="120"/>
      <line x1="100" y1="180" x2="550" y2="180"/>
      <line x1="0" y1="240" x2="480" y2="240"/>
      <line x1="50" y1="300" x2="380" y2="300"/>
      <line x1="0" y1="340" x2="520" y2="340"/>
      <line x1="80" y1="0" x2="80" y2="400"/>
      <line x1="160" y1="60" x2="160" y2="240"/>
      <line x1="240" y1="0" x2="240" y2="180"/>
      <line x1="320" y1="120" x2="320" y2="400"/>
      <line x1="480" y1="60" x2="480" y2="300"/>
      <line x1="560" y1="0" x2="560" y2="180"/>
    </g>
    <!-- PCB vias: left -->
    <g opacity="0.30">
      <circle cx="80" cy="60" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="80" cy="60" r="2" fill="#1C3045"/>
      <circle cx="160" cy="60" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="160" cy="60" r="2" fill="#1C3045"/>
      <circle cx="240" cy="180" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="240" cy="180" r="2" fill="#1C3045"/>
      <circle cx="320" cy="120" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="320" cy="120" r="2" fill="#1C3045"/>
      <circle cx="480" cy="60" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="480" cy="60" r="2" fill="#1C3045"/>
      <circle cx="480" cy="300" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="480" cy="300" r="2" fill="#1C3045"/>
      <circle cx="160" cy="240" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="160" cy="240" r="2" fill="#1C3045"/>
      <circle cx="320" cy="240" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="320" cy="240" r="2" fill="#1C3045"/>
    </g>

    <!-- PCB traces: right zone -->
    <g opacity="0.28" stroke="#1C2D3E" stroke-width="1" fill="none">
      <line x1="1100" y1="80" x2="1600" y2="80"/>
      <line x1="1200" y1="160" x2="1600" y2="160"/>
      <line x1="1080" y1="240" x2="1600" y2="240"/>
      <line x1="1150" y1="320" x2="1600" y2="320"/>
      <line x1="1100" y1="0" x2="1100" y2="400"/>
      <line x1="1200" y1="80" x2="1200" y2="400"/>
      <line x1="1300" y1="0" x2="1300" y2="240"/>
      <line x1="1400" y1="80" x2="1400" y2="400"/>
      <line x1="1500" y1="0" x2="1500" y2="320"/>
    </g>
    <!-- PCB vias: right -->
    <g opacity="0.28">
      <circle cx="1100" cy="80" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1100" cy="80" r="2" fill="#1C3045"/>
      <circle cx="1200" cy="160" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1200" cy="160" r="2" fill="#1C3045"/>
      <circle cx="1200" cy="80" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1200" cy="80" r="2" fill="#1C3045"/>
      <circle cx="1300" cy="240" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1300" cy="240" r="2" fill="#1C3045"/>
      <circle cx="1400" cy="80" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1400" cy="80" r="2" fill="#1C3045"/>
      <circle cx="1400" cy="320" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1400" cy="320" r="2" fill="#1C3045"/>
      <circle cx="1100" cy="240" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1100" cy="240" r="2" fill="#1C3045"/>
      <circle cx="1100" cy="320" r="4" fill="none" stroke="#1C3045" stroke-width="0.75"/><circle cx="1100" cy="320" r="2" fill="#1C3045"/>
    </g>

    <!-- MCU block schematic -->
    <g opacity="0.16">
      <rect x="1340" y="130" width="120" height="70" rx="2" stroke="#3E8EDB" stroke-width="0.75" fill="none"/>
      <line x1="1340" y1="155" x2="1315" y2="155" stroke="#3E8EDB" stroke-width="0.75"/>
      <line x1="1340" y1="175" x2="1305" y2="175" stroke="#3E8EDB" stroke-width="0.75"/>
      <line x1="1460" y1="155" x2="1485" y2="155" stroke="#3E8EDB" stroke-width="0.75"/>
      <line x1="1460" y1="175" x2="1490" y2="175" stroke="#3E8EDB" stroke-width="0.75"/>
      <text x="1400" y="170" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="500" fill="#3E8EDB" letter-spacing="2">MCU</text>

      <rect x="1120" y="250" width="90" height="52" rx="2" stroke="#3E8EDB" stroke-width="0.75" fill="none"/>
      <text x="1165" y="279" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="500" fill="#3E8EDB" letter-spacing="1.5">AI CORE</text>
      <line x1="1165" y1="250" x2="1165" y2="240" stroke="#3E8EDB" stroke-width="0.75"/>
      <line x1="1210" y1="276" x2="1235" y2="276" stroke="#3E8EDB" stroke-width="0.75"/>
    </g>

    <!-- Fade overlays for legibility -->
    <rect x="0" y="0" width="820" height="400" fill="url(#left-fade)"/>
    <rect x="780" y="0" width="820" height="400" fill="url(#right-fade)"/>

    <!-- Blue accent vertical rule -->
    <line x1="70" y1="55" x2="70" y2="255" stroke="#3E8EDB" stroke-width="1.5" stroke-linecap="round"/>

    <!-- DRDO label -->
    <text x="100" y="75"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="11" font-weight="400" fill="#6E6E73" letter-spacing="1.8">RESEARCH INTERN — DRDO</text>

    <!-- Name -->
    <text x="100" y="145"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="82" font-weight="600" fill="#F5F5F7" letter-spacing="-1.5">PRABUDDHA SAXENA</text>

    <!-- Hairline divider -->
    <line x1="100" y1="170" x2="900" y2="170" stroke="#2A2A2E" stroke-width="0.5"/>

    <!-- Degree -->
    <text x="100" y="205"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="24" font-weight="400" fill="#A1A1A6" letter-spacing="0.3">Electronics &amp; Communication Engineering</text>

    <!-- Tagline -->
    <text x="100" y="235"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="18" font-weight="300" fill="#6E6E73" letter-spacing="0.2">Building intelligent systems across software and hardware.</text>

    <!-- Domain tags -->
    <text x="100" y="285"
      font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
      font-size="16" font-weight="500" fill="#3E8EDB" letter-spacing="2.5">EMBEDDED SYSTEMS · AI SYSTEMS · COMPUTER VISION · FULL STACK</text>
  </g>
</svg>
